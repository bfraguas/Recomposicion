<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#0C0C0C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Plan">
<title>Plan Semanal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0C0C0C;color:#F0F0F0;min-height:100vh;max-width:520px;margin:0 auto}
.top-bar{padding:20px 16px 0}
.eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#C8F135;font-weight:700;margin-bottom:6px}
h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.subtitle{font-size:12px;color:#666;margin-bottom:14px}
.person-wrap{display:flex;gap:8px;margin-bottom:12px}
.person-btn{flex:1;padding:10px;border:1px solid #252525;border-radius:10px;background:#161616;color:#666;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.person-btn.active{border-color:#C8F135;color:#F0F0F0;background:#1A1A1A}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.person-btn.active .avatar{background:#C8F135;color:#000}
.person-btn:not(.active) .avatar{background:#2A2A2A;color:#555}
.section-tabs{display:flex;background:#161616;border:1px solid #252525;border-radius:12px;padding:4px;gap:4px;margin-bottom:16px}
.sec-btn{flex:1;padding:11px 0;border:none;border-radius:9px;background:transparent;color:#666;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.sec-btn.active{background:#C8F135;color:#000}
.content{padding:0 16px 120px}
/* ─── DIET ─────────────────────────────── */
.toggle-wrap{display:flex;background:#161616;border:1px solid #252525;border-radius:10px;padding:4px;gap:4px;margin-bottom:18px}
.toggle-btn{flex:1;padding:10px 0;border:none;border-radius:7px;background:transparent;color:#666;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.toggle-btn.active{background:#C8F135;color:#000}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:#161616;border:1px solid #252525;border-radius:10px;padding:12px}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#555;margin-bottom:4px;font-weight:700}
.stat-value{font-size:20px;font-weight:800;letter-spacing:-.5px}
.stat-unit{font-size:10px;color:#555;margin-top:1px}
.macro-card{background:#161616;border:1px solid #252525;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.macro-bar-wrap{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px;margin:10px 0}
.macro-legend{display:flex;gap:14px;flex-wrap:wrap}
.macro-legend-item{display:flex;align-items:center;gap:5px;font-size:11px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mac-label{color:#666}.mac-val{font-weight:700}
.meals-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.meal-card{background:#161616;border:1px solid #252525;border-radius:12px;overflow:hidden;transition:border-color .15s}
.meal-card.open{border-color:rgba(200,241,53,.35)}
.meal-card.eaten{opacity:.65}
.meal-card.pre-workout{border-color:#FF8C6940}
.meal-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.meal-icon{width:42px;height:42px;border-radius:10px;background:#232323;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .15s}
.meal-card.open .meal-icon{background:#C8F135}
.meal-card.pre-workout .meal-icon{background:#FF8C6930}
.meal-time{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#555;font-weight:700;margin-bottom:2px}
.meal-card.open .meal-time{color:#C8F135}
.meal-card.pre-workout .meal-time{color:#FF8C69}
.meal-name{font-size:15px;font-weight:700;letter-spacing:-.2px}
.meal-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}
.meal-kcal{font-size:18px;font-weight:800;text-align:right}
.meal-card.open .meal-kcal{color:#C8F135}
.meal-kcal-unit{font-size:10px;color:#555;text-align:right}
.eat-btn{width:32px;height:32px;border-radius:8px;border:1px solid #333;background:transparent;color:#555;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.meal-card.eaten .eat-btn{background:#C8F13530;border-color:#C8F135;color:#C8F135}
.chevron{font-size:13px;color:#444;margin-left:2px;transition:transform .2s;flex-shrink:0}
.meal-card.open .chevron{transform:rotate(180deg)}
.mini-bar-wrap{height:3px;display:flex;gap:1px;margin:-6px 16px 10px;border-radius:2px;overflow:hidden}
.meal-body{padding:0 16px 16px;display:none}
.meal-card.open .meal-body{display:block}
.macro-pills{display:flex;gap:8px;margin-bottom:14px}
.macro-pill{flex:1;background:#1E1E1E;border-radius:8px;padding:8px;text-align:center}
.pill-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.pill-val{font-size:15px;font-weight:800}
.item-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;font-size:13px;color:#D0D0D0;line-height:1.4;border-bottom:1px solid #1E1E1E}
.item-row:last-child{border-bottom:none}
.item-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
.item-row.subbed .item-dot{background:#FF8C69}
.item-row:not(.subbed) .item-dot{background:#C8F135}
.item-orig{font-size:11px;color:#444;text-decoration:line-through;margin-bottom:2px}
.restore-btn{border:none;background:none;color:#555;cursor:pointer;font-size:12px;flex-shrink:0;padding:2px 6px;border:1px solid #2A2A2A;border-radius:5px;margin-left:auto}
.tip-box{background:#131313;border-left:3px solid #C8F135;border-radius:0 8px 8px 0;padding:9px 12px;font-size:12px;color:#777;line-height:1.5;margin-top:12px}
.meal-card.pre-workout .tip-box{border-color:#FF8C69}
.acc-btn{width:100%;background:#1A1A1A;border:1px solid #252525;border-radius:8px;padding:9px 12px;font-size:12px;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit;margin-top:10px}
.acc-body{display:none;margin-top:6px;background:#111;border:1px solid #1E1E1E;border-radius:8px;padding:12px}
.acc-body.open{display:block}
.sub-group{margin-bottom:10px}.sub-group:last-child{margin-bottom:0}
.sub-group-label{font-size:10px;font-weight:700;color:#FF8C69;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.sub-opt{font-size:12px;color:#888;padding:3px 0 3px 12px;position:relative;line-height:1.4}
.sub-opt::before{content:"";position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:#333}
.calc-label{font-size:10px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.calc-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-end}
.calc-field{flex:1}.calc-gram{width:72px;flex:none}
.calc-input{width:100%;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:7px;padding:8px 10px;font-size:13px;color:#F0F0F0;font-family:inherit;outline:none}
.calc-input:focus{border-color:#C8F135}
.calc-select{width:100%;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:7px;padding:8px 10px;font-size:13px;color:#F0F0F0;font-family:inherit;outline:none;-webkit-appearance:none}
.cmp-box{background:#0F0F0F;border:1px solid #1E1E1E;border-radius:8px;padding:10px 12px;margin:8px 0}
.cmp-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #141414}
.cmp-row:last-child{border-bottom:none;font-weight:700}
.cmp-label{color:#555}
.apply-btn{width:100%;padding:10px;background:#C8F135;border:none;border-radius:8px;font-size:13px;font-weight:700;color:#000;cursor:pointer;margin-top:8px;font-family:inherit}
.apply-btn:disabled{opacity:.4;cursor:default}
.rules-card{background:#161616;border:1px solid #252525;border-radius:12px;padding:16px;margin-bottom:12px}
.rules-eyebrow{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:#C8F135;font-weight:700;margin-bottom:12px}
.rule-row{display:flex;gap:10px;padding:8px 0;font-size:12.5px;color:#888;border-bottom:1px solid #1E1E1E;line-height:1.4}
.rule-row:last-child{border-bottom:none}
.rule-icon{font-size:14px;flex-shrink:0}
/* ─── TRAINING ──────────────────────────── */
.days-wrap{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.days-wrap::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:8px 14px;border:1px solid #252525;border-radius:8px;background:#161616;color:#666;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.day-btn.active{background:#C8F135;color:#000;border-color:#C8F135}
.day-btn.done-day{border-color:#1E1E1E;color:#333}
.session-header{background:#161616;border:1px solid #252525;border-radius:12px;padding:16px;margin-bottom:14px}
.session-tag{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#C8F135;font-weight:700;margin-bottom:4px}
.session-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.session-muscles{font-size:12px;color:#666}
.done-badge{display:inline-flex;align-items:center;gap:5px;background:#1A2A0A;border:1px solid #3A5A1A;border-radius:6px;padding:4px 10px;font-size:11px;color:#8BC34A;margin-top:8px}
.exs-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ex-card{background:#161616;border:1px solid #252525;border-radius:12px;overflow:hidden;transition:border-color .15s}
.ex-card.open{border-color:rgba(200,241,53,.4)}
.ex-card.completed{opacity:.6}
.ex-card.completed .ex-name{text-decoration:line-through;color:#555}
.ex-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.ex-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ex-info{flex:1}
.ex-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:3px}
.ex-muscle{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.08em}
.ex-badge{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ex-sets{font-size:13px;font-weight:800;text-align:right}
.ex-reps{font-size:10px;color:#666;text-align:right}
.done-btn{width:30px;height:30px;border-radius:7px;border:1px solid #2A2A2A;background:transparent;color:#444;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ex-card.completed .done-btn{background:#C8F13520;border-color:#C8F135;color:#C8F135}
.ex-chevron{font-size:12px;color:#333;margin-left:2px;transition:transform .2s;flex-shrink:0}
.ex-card.open .ex-chevron{transform:rotate(180deg)}
.ex-body{display:none;padding:0 14px 14px}
.ex-card.open .ex-body{display:block}
.ex-stats{display:flex;gap:8px;margin-bottom:12px}
.ex-stat{flex:1;background:#1A1A1A;border-radius:8px;padding:8px;text-align:center}
.ex-stat-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.ex-stat-val{font-size:14px;font-weight:800}
.ex-note{background:#111;border-left:3px solid #C8F135;border-radius:0 8px 8px 0;padding:9px 12px;font-size:12px;color:#777;line-height:1.5}
.sets-track{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.set-pill{width:36px;height:36px;border-radius:8px;border:1px solid #2A2A2A;background:transparent;color:#555;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.set-pill.sdone{background:#C8F13525;border-color:#C8F135;color:#C8F135}
.set-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:700}
/* ─── TRACKER ───────────────────────────── */
.tracker{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #222;padding:10px 16px 14px;z-index:50;max-width:520px;margin:0 auto}
.tracker-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.tracker-pct{font-size:20px;font-weight:800;color:#C8F135;flex-shrink:0;width:48px}
.tracker-bar-wrap{flex:1}
.tracker-bar-bg{height:6px;background:#222;border-radius:3px;overflow:hidden}
.tracker-bar-fill{height:100%;background:#C8F135;border-radius:3px;transition:width .3s}
.tracker-info{font-size:11px;color:#666;margin-top:3px}
.tracker-reset{background:none;border:1px solid #252525;border-radius:7px;padding:6px 10px;color:#555;font-size:11px;cursor:pointer;flex-shrink:0}
.tracker-macros{display:flex;gap:12px}
.tmacro{display:flex;align-items:center;gap:5px;font-size:11px}
.tmacro-l{font-weight:700}.tmacro-v{color:#666}
.footer-note{font-size:11px;color:#333;text-align:center;line-height:1.6;margin-bottom:8px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="eyebrow">Plan Semanal</div>
  <h1>Dieta &amp; Entrenamiento</h1>
  <p class="subtitle" id="top-subtitle">Semana de recomposicion</p>

  <div class="person-wrap">

</div>

<div class="content">

  <!-- ══ DIET SECTION ══════════════════════════════════════════════════════ -->
  <div id="sec-diet">

    <div class="meals-wrap" id="meals-container"></div>
    <div class="rules-card">
      <div class="rules-eyebrow">Protocolo anti-hinchazon</div>

    <div class="footer-note" id="footer-note"></div>
  </div>

  <!-- ══ TRAINING SECTION ══════════════════════════════════════════════════ -->
  <div id="sec-training" style="display:none">
    <div class="days-wrap" id="days-wrap"></div>
    <div id="session-header"></div>
    <div class="exs-wrap" id="exs-container"></div>
  </div>

</div><!-- /content -->

<!-- ══ TRACKER ══════════════════════════════════════════════════════════════ -->
<div class="tracker" id="tracker">
  <div class="tracker-top">
    <div class="tracker-pct" id="tr-pct">0%</div>
    <div class="tracker-bar-wrap">
      <div class="tracker-bar-bg"><div class="tracker-bar-fill" id="tr-fill" style="width:0%"></div></div>
      <div class="tracker-info" id="tr-info"></div>

</div>

// ── Storage ───────────────────────────────────────────────────────────────────
var today = new Date().toISOString().split("T")[0];
function eatKey()  { return "eat_"+person+"_"+dietDay+"_"+today; }
function subKey()  { return "mysubs_"+person+"_"+dietDay; }
function exKey()   { return "exdone_"+person+"_"+trainDay+"_"+today; }
function setKey()  { return "setdone_"+person+"_"+trainDay+"_"+today; }
function load(k)   { try{return JSON.parse(localStorage.getItem(k))||{};}catch(e){return{};} }
function save(k,v) { localStorage.setItem(k,JSON.stringify(v)); }

// ── Toggles ───────────────────────────────────────────────────────────────────
function setPerson(p) {
  person=p; openMeal=null; openSubs={}; openCalc={}; openEx=null;
  document.querySelectorAll(".person-btn").forEach(function(b,i){b.classList.toggle("active",(i===0&&p==="borja")||(i===1&&p==="lurdes"));});
  renderAll();
}
function setSection(s) {
  section=s;
  document.getElementById("sec-diet").style.display     = s==="diet"     ?"block":"none";
  document.getElementById("sec-training").style.display  = s==="training" ?"block":"none";
  document.querySelectorAll(".sec-btn").forEach(function(b,i){b.classList.toggle("active",(i===0&&s==="diet")||(i===1&&s==="training"));});
  renderTracker();
}
function setDietDay(d) {
  dietDay=d; openMeal=null; openSubs={}; openCalc={};
  document.querySelectorAll(".toggle-btn").forEach(function(b,i){b.classList.toggle("active",(i===0&&d==="gym")||(i===1&&d==="rest"));});
  renderDiet();
}
function setTrainDay(d) { trainDay=d; openEx=null; renderTraining(); }
function toggleMeal(i)  { openMeal=openMeal===i?null:i; renderDiet(); }
function toggleSubs(id) { openSubs[id]=!openSubs[id]; renderDiet(); }
function toggleCalc(id) { openCalc[id]=!openCalc[id]; renderDiet(); }
function toggleEat(id)  { var e=load(eatKey()); e[id]=!e[id]; save(eatKey(),e); renderDiet(); renderTracker(); }
function toggleEx(id)   { openEx=openEx===id?null:id; renderTraining(); }
function toggleDone(id) { var d=load(exKey()); d[id]=!d[id]; if(!d[id]){var s=load(setKey());delete s[id];save(setKey(),s);} save(exKey(),d); renderTraining(); renderTracker(); }
function toggleSet(exId,si) {
  var s=load(setKey()); if(!s[exId])s[exId]={};
  s[exId][si]=!s[exId][si]; save(setKey(),s);
  var sess=WORKOUTS[person][trainDay];
  if(sess){var ex=sess.exercises.filter(function(e){return e.id===exId;})[0];
    if(ex){var cnt=Object.values(s[exId]).filter(Boolean).length;var d=load(exKey());d[exId]=(cnt>=ex.sets);save(exKey(),d);}}
  renderTraining(); renderTracker();
}
function resetCurrent() {
  if(section==="diet"){localStorage.removeItem(eatKey());renderDiet();}
  else{localStorage.removeItem(exKey());localStorage.removeItem(setKey());renderTraining();}
  renderTracker();
}

// ── Math helpers ──────────────────────────────────────────────────────────────
function pcts(m){var t=m.p*4+m.c*4+m.g*9;if(!t)return{p:0,c:0,g:0};return{p:Math.round(m.p*4/t*100),c:Math.round(m.c*4/t*100),g:Math.round(m.g*9/t*100)};}
function r1(n){return Math.round(n*10)/10;}
function fmt(n){return n>=1000?Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,"."):Math.round(n).toString();}
function dStr(v){return(v>=0?"+":"")+Math.round(v);}
function dCol(v){return v>5?"#FF8C69":v<-5?"#4DC9FF":"#888";}

// ── Effective meal macros ─────────────────────────────────────────────────────
function effMeal(meal){
  var subs=load(subKey())[meal.id]||{};
  var kcal=meal.kcal,p=meal.macros.p,c=meal.macros.c,g=meal.macros.g;
  Object.keys(subs).forEach(function(idx){
    var sub=subs[idx],oi=meal.itemData&&meal.itemData[parseInt(idx)];
    if(!oi||!oi.food)return;
    var oF=FOODS[oi.food],nF=FOODS[sub.food];
    if(!oF||!nF)return;
    var f=1/100;
    kcal=Math.round(kcal+(nF.k*sub.grams-oF.k*oi.grams)*f);
    p=Math.max(0,Math.round(p+(nF.p*sub.grams-oF.p*oi.grams)*f));
    c=Math.max(0,Math.round(c+(nF.c*sub.grams-oF.c*oi.grams)*f));
    g=Math.max(0,Math.round(g+(nF.g*sub.grams-oF.g*oi.grams)*f));
  });
  return{kcal:kcal,macros:{p:p,c:c,g:g}};
}

// ── Sub calculator ────────────────────────────────────────────────────────────
function updateSubCalc(mealId){
  var d=PLANS[person][dietDay];
  var meal=d.meals.filter(function(m){return m.id===mealId;})[0];if(!meal)return;
  var selEl=document.getElementById("ss-"+mealId),foodEl=document.getElementById("sf-"+mealId),grEl=document.getElementById("sg-"+mealId);
  var cmpEl=document.getElementById("sc-"+mealId),applyEl=document.getElementById("sa-"+mealId);
  if(!selEl||!foodEl||!grEl)return;
  var idx=parseInt(selEl.value),food=(foodEl.value||"").trim(),grams=parseFloat(grEl.value)||0;
  var nF=FOODS[food],oi=(!isNaN(idx)&&meal.itemData)?meal.itemData[idx]:null,oF=oi&&oi.food?FOODS[oi.food]:null;
  if(!oF||!nF||grams<=0||isNaN(idx)){cmpEl.innerHTML="";applyEl.disabled=true;return;}
  var f=1/100;
  var oK=r1(oF.k*oi.grams*f),oP=r1(oF.p*oi.grams*f),oC=r1(oF.c*oi.grams*f),oG=r1(oF.g*oi.grams*f);
  var nK=r1(nF.k*grams*f),nP=r1(nF.p*grams*f),nC=r1(nF.c*grams*f),nG=r1(nF.g*grams*f);
  var dK=nK-oK,dP=nP-oP,dC=nC-oC,dG=nG-oG;
  cmpEl.innerHTML="<div class='cmp-box'>"+
    "<div class='cmp-row'><span class='cmp-label'>Original — "+oi.food+" "+oi.grams+"g</span><span style='color:#555'>"+oK+" kcal &nbsp;P:"+oP+" C:"+oC+" G:"+oG+"</span></div>"+
    "<div class='cmp-row'><span class='cmp-label'>Nuevo — "+food+" "+grams+"g</span><span style='color:#C8F135'>"+nK+" kcal &nbsp;P:"+nP+" C:"+nC+" G:"+nG+"</span></div>"+
    "<div class='cmp-row'><span class='cmp-label'>Diferencia</span><span style='color:"+dCol(dK)+"'>"+dStr(dK)+" kcal &nbsp;P:"+dStr(dP)+" C:"+dStr(dC)+" G:"+dStr(dG)+"</span></div>"+
    "</div>";
  applyEl.disabled=false;
}
function applySub(mealId){
  var d=PLANS[person][dietDay],meal=d.meals.filter(function(m){return m.id===mealId;})[0];if(!meal)return;
  var idx=parseInt(document.getElementById("ss-"+mealId).value),food=(document.getElementById("sf-"+mealId).value||"").trim(),grams=parseFloat(document.getElementById("sg-"+mealId).value)||0;
  if(!FOODS[food]||grams<=0||isNaN(idx))return;
  var subs=load(subKey());if(!subs[mealId])subs[mealId]={};
  subs[mealId][String(idx)]={food:food,grams:grams};save(subKey(),subs);
  openCalc[mealId]=false;renderDiet();
}
function restoreSub(mealId,idx){
  var subs=load(subKey());if(subs[mealId])delete subs[mealId][String(idx)];
  save(subKey(),subs);renderDiet();
}

// ── RENDER DIET ───────────────────────────────────────────────────────────────
function renderDiet(){
  var d=PLANS[person][dietDay];
  var eaten=load(eatKey()),allSubs=load(subKey());
  document.getElementById("s-kcal").textContent=d.kcal;
  document.getElementById("s-def").textContent=d.def;
  document.getElementById("s-prot").textContent=d.prot;
  document.getElementById("s-unit").textContent=d.unit;
  document.getElementById("footer-note").innerHTML="TDEE ~"+d.tdee+" kcal &middot; Proteinas en peso crudo";
  var pt=pcts(d.macros);
  document.getElementById("macro-bar").innerHTML="<div style='width:"+pt.p+"%;background:#FF6B6B;border-radius:4px 0 0 4px;transition:width .3s'></div><div style='width:"+pt.c+"%;background:#4DC9FF;transition:width .3s'></div><div style='width:"+pt.g+"%;background:#FFD166;border-radius:0 4px 4px 0;transition:width .3s'></div>";
  document.getElementById("ml-p").textContent=d.macros.p+"g ("+pt.p+"%)";
  document.getElementById("ml-c").textContent=d.macros.c+"g ("+pt.c+"%)";
  document.getElementById("ml-g").textContent=d.macros.g+"g ("+pt.g+"%)";
  var html="";
  d.meals.forEach(function(meal,i){
    var mSubs=allSubs[meal.id]||{};var eff=effMeal(meal);var mp=pcts(eff.macros);
    var isOpen=openMeal===i,isEaten=!!eaten[meal.id],isPre=!!meal.preWorkout,hasMod=Object.keys(mSubs).length>0;
    var cls="meal-card"+(isOpen?" open":"")+(isEaten?" eaten":"")+(isPre?" pre-workout":"");
    html+="<div class='"+cls+"'>";
    html+="<div class='meal-header' onclick='toggleMeal("+i+")'>";
    html+="<div class='meal-icon'>"+meal.icon+"</div>";
    html+="<div style='flex:1'><div class='meal-time'>"+meal.time+"</div><div class='meal-name'>"+meal.name+(hasMod?"&nbsp;<span style='font-size:9px;color:#FF8C69'>✎</span>":"")+"</div></div>";
    html+="<div class='meal-right'><div><div class='meal-kcal'>"+eff.kcal+"</div><div class='meal-kcal-unit'>kcal</div></div>";
    html+="<button class='eat-btn' onclick='event.stopPropagation();toggleEat(\""+meal.id+"\")'>"+(isEaten?"&#10003;":"&#9711;")+"</button>";
    html+="<span class='chevron'>&#9662;</span></div></div>";
    html+="<div class='mini-bar-wrap'><div style='width:"+mp.p+"%;background:#FF6B6B'></div><div style='width:"+mp.c+"%;background:#4DC9FF'></div><div style='width:"+mp.g+"%;background:#FFD166'></div></div>";
    html+="<div class='meal-body'>";
    html+="<div class='macro-pills'><div class='macro-pill'><div class='pill-label'>Proteina</div><div class='pill-val' style='color:#FF6B6B'>"+eff.macros.p+"g</div></div><div class='macro-pill'><div class='pill-label'>Carbs</div><div class='pill-val' style='color:#4DC9FF'>"+eff.macros.c+"g</div></div><div class='macro-pill'><div class='pill-label'>Grasas</div><div class='pill-val' style='color:#FFD166'>"+eff.macros.g+"g</div></div></div>";
    meal.items.forEach(function(it,idx){
      var sub=mSubs[String(idx)];
      if(sub&&FOODS[sub.food]){html+="<div class='item-row subbed'><div class='item-dot'></div><div style='flex:1'><div class='item-orig'>"+it+"</div><div>"+sub.grams+"g "+sub.food+"</div></div><button class='restore-btn' onclick='event.stopPropagation();restoreSub(\""+meal.id+"\","+idx+")'>&#8635;</button></div>";}
      else{html+="<div class='item-row'><div class='item-dot'></div><span>"+it+"</span></div>";}
    });
    html+="<div class='tip-box'>&#128161; "+meal.tip+"</div>";
    var sOpen=!!openSubs[meal.id];
    html+="<button class='acc-btn' onclick='event.stopPropagation();toggleSubs(\""+meal.id+"\")'>&#8652;&nbsp;Sustituciones <span>"+(sOpen?"&#9650;":"&#9660;")+"</span></button>";
    html+="<div class='acc-body"+(sOpen?" open":"")+"'>";
    meal.subs.forEach(function(sg){html+="<div class='sub-group'><div class='sub-group-label'>"+sg.label+"</div>";sg.opts.forEach(function(o){html+="<div class='sub-opt'>"+o+"</div>";});html+="</div>";});
    html+="</div>";
    var cOpen=!!openCalc[meal.id],hasSub=meal.itemData&&meal.itemData.some(function(d){return d&&d.food;});
    if(hasSub){
      html+="<button class='acc-btn' style='border-color:#C8F13540;color:#9DCC2F' onclick='event.stopPropagation();toggleCalc(\""+meal.id+"\")'>&#128290;&nbsp;Cambiar ingrediente <span>"+(cOpen?"&#9650;":"&#9660;")+"</span></button>";
      html+="<div class='acc-body"+(cOpen?" open":"")+"'>";
      html+="<div class='calc-label' style='margin-bottom:6px'>Sustituir</div><select class='calc-select' id='ss-"+meal.id+"' onchange='updateSubCalc(\""+meal.id+"\")'><option value=''>Selecciona el ingrediente...</option>";
      meal.itemData.forEach(function(d,idx){if(d&&d.food){var lbl=meal.items[idx].length>42?meal.items[idx].substring(0,42)+"...":meal.items[idx];html+="<option value='"+idx+"'>"+lbl+"</option>";}});
      html+="</select>";
      html+="<div class='calc-row' style='margin-top:10px'><div class='calc-field'><div class='calc-label'>Por</div><input class='calc-input' id='sf-"+meal.id+"' list='food-list' placeholder='Buscar alimento...' oninput='updateSubCalc(\""+meal.id+"\")'></div><div class='calc-field calc-gram'><div class='calc-label'>Gramos</div><input class='calc-input' id='sg-"+meal.id+"' type='number' min='1' max='2000' placeholder='0' oninput='updateSubCalc(\""+meal.id+"\")'></div></div>";
      html+="<div id='sc-"+meal.id+"'></div><button class='apply-btn' id='sa-"+meal.id+"' onclick='applySub(\""+meal.id+"\")' disabled>&#10003; Aplicar cambio</button></div>";
    }
    html+="</div></div>";
  });
  document.getElementById("meals-container").innerHTML=html;
  renderTracker();
}

// ── RENDER TRAINING ───────────────────────────────────────────────────────────
function renderTraining(){
  var doneMap=load(exKey()),setsMap=load(setKey());
  var dHtml="";
  TRAIN_DAYS.forEach(function(d){
    var s=WORKOUTS[person][d.key];
    var isA=d.key===trainDay,isDone=s&&s.done;
    dHtml+="<button class='day-btn"+(isA?" active":"")+(isDone&&!isA?" done-day":"")+"' onclick='setTrainDay(\""+d.key+"\")'>"+d.label+(s?"&nbsp;&middot;&nbsp;"+s.name:"")+"</button>";
  });
  document.getElementById("days-wrap").innerHTML=dHtml;
  var sess=WORKOUTS[person][trainDay];
  if(!sess){document.getElementById("session-header").innerHTML="";document.getElementById("exs-container").innerHTML="";return;}
  var hd="<div class='session-header'><div class='session-tag'>"+sess.name+"</div><div class='session-name'>"+sess.subtitle+"</div><div class='session-muscles'>"+sess.muscles+"</div>";
  if(sess.done)hd+="<div class='done-badge'>&#10003;&nbsp;Sesion completada</div>";
  hd+="</div>";
  document.getElementById("session-header").innerHTML=hd;
  var html="";
  sess.exercises.forEach(function(ex){
    var isOpen=openEx===ex.id,isDone=!!doneMap[ex.id],exSets=setsMap[ex.id]||{};
    var col=TYPE_COLOR[ex.type]||"#888";
    var cls="ex-card"+(isOpen?" open":"")+(isDone?" completed":"");
    html+="<div class='"+cls+"'>";
    html+="<div class='ex-header' onclick='toggleEx(\""+ex.id+"\")'>";
    html+="<div class='ex-type-dot' style='background:"+col+"'></div>";
    html+="<div class='ex-info'><div class='ex-name'>"+ex.name+"</div><div class='ex-muscle'>"+ex.muscle+"&nbsp;&middot;&nbsp;"+(TYPE_LABEL[ex.type]||ex.type)+"</div></div>";
    html+="<div class='ex-badge'><div style='text-align:right'><div class='ex-sets'>"+ex.sets+"&times;"+ex.reps+"</div><div class='ex-reps'>"+ex.rest+"</div></div>";
    html+="<button class='done-btn' onclick='event.stopPropagation();toggleDone(\""+ex.id+"\")'>"+(isDone?"&#10003;":"&#9711;")+"</button></div>";
    html+="<span class='ex-chevron'>&#9662;</span></div>";
    html+="<div class='ex-body'>";
    html+="<div class='ex-stats'><div class='ex-stat'><div class='ex-stat-label'>Series</div><div class='ex-stat-val' style='color:"+col+"'>"+ex.sets+"</div></div><div class='ex-stat'><div class='ex-stat-label'>Reps</div><div class='ex-stat-val'>"+ex.reps+"</div></div><div class='ex-stat'><div class='ex-stat-label'>Descanso</div><div class='ex-stat-val' style='color:#888'>"+ex.rest+"</div></div></div>";
    html+="<div class='set-label'>Marcar series</div><div class='sets-track'>";
    for(var s=0;s<ex.sets;s++){var sd=!!(exSets[s]);html+="<button class='set-pill"+(sd?" sdone":"")+"' onclick='event.stopPropagation();toggleSet(\""+ex.id+"\","+s+")' >"+(sd?"✓":(s+1))+"</button>";}
    html+="</div><div class='ex-note'>&#128161; "+ex.note+"</div></div></div>";
  });
  document.getElementById("exs-container").innerHTML=html;
  renderTracker();
}

// ── RENDER TRACKER ────────────────────────────────────────────────────────────
function renderTracker(){
  if(section==="diet"){
    var d=PLANS[person][dietDay],eaten=load(eatKey());
    var tK=0,tP=0,tC=0,tG=0;
    d.meals.forEach(function(m){if(eaten[m.id]){var e=effMeal(m);tK+=e.kcal;tP+=e.macros.p;tC+=e.macros.c;tG+=e.macros.g;}});
    var tot=d.meals.reduce(function(a,m){return a+effMeal(m).kcal;},0);
    var pv=tot>0?Math.min(100,Math.round(tK/tot*100)):0;
    document.getElementById("tr-pct").textContent=pv+"%";
    document.getElementById("tr-fill").style.width=pv+"%";
    document.getElementById("tr-info").textContent=fmt(tK)+" / "+fmt(tot)+" kcal consumidas";
    document.getElementById("tr-macros").innerHTML=
      "<div class='tmacro'><span class='tmacro-l' style='color:#FF6B6B'>P&nbsp;</span><span class='tmacro-v'>"+tP+"/"+d.macros.p+"g</span></div>"+
      "<div class='tmacro'><span class='tmacro-l' style='color:#4DC9FF'>C&nbsp;</span><span class='tmacro-v'>"+tC+"/"+d.macros.c+"g</span></div>"+
      "<div class='tmacro'><span class='tmacro-l' style='color:#FFD166'>G&nbsp;</span><span class='tmacro-v'>"+tG+"/"+d.macros.g+"g</span></div>";
  } else {
    var sess=WORKOUTS[person][trainDay];
    if(!sess){document.getElementById("tr-pct").textContent="—";document.getElementById("tr-fill").style.width="0%";document.getElementById("tr-info").textContent="Selecciona un dia";document.getElementById("tr-macros").innerHTML="";return;}
    var doneMap=load(exKey()),setsMap=load(setKey());
    var totEx=sess.exercises.length,doneEx=0,doneSets=0,totSets=0;
    sess.exercises.forEach(function(ex){if(doneMap[ex.id])doneEx++;var es=setsMap[ex.id]||{};doneSets+=Object.values(es).filter(Boolean).length;totSets+=ex.sets;});
    var pv2=totEx>0?Math.min(100,Math.round(doneEx/totEx*100)):0;
    document.getElementById("tr-pct").textContent=pv2+"%";
    document.getElementById("tr-fill").style.width=pv2+"%";
    document.getElementById("tr-info").textContent=doneEx+" / "+totEx+" ejercicios";
    document.getElementById("tr-macros").innerHTML=
      "<div class='tmacro'><span class='tmacro-l'>Series&nbsp;</span><span class='tmacro-v'>"+doneSets+"/"+totSets+"</span></div>"+
      "<div class='tmacro'><span class='tmacro-l'>Ejercicios&nbsp;</span><span class='tmacro-v'>"+doneEx+"/"+totEx+"</span></div>";
  }
}

function renderAll(){ renderDiet(); renderTraining(); renderTracker(); }
renderAll();
</script>
